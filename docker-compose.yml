services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ikkiattor-backend:latest
    container_name: ikkiattor-backend
    restart: always
    volumes:
      - ikkiattor-db:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-ikkiattor-super-secret-key}
      - PORT=3001
    command: sh -c "mkdir -p /app/data && npx prisma migrate deploy && npx ts-node server.ts"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/products || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ikkiattor-frontend:latest
    container_name: ikkiattor-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ikkiattor-db:
